kind = "web"
previewPath = "/"
title = "AI Cash Flow"
version = "1.0.0"
id = "artifacts/ai-cash-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19804

[services.development]
run = "pnpm --filter @workspace/ai-cash-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-cash-flow", "run", "build" ]
publicDir = "artifacts/ai-cash-flow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19804"
BASE_PATH = "/"
